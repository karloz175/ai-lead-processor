services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/leads.db:/app/leads.db
    env_file:
      - ./backend/.env
    restart: unless-stopped

  telegram-bot:
    build: ./backend
    command: python run_bot.py
    volumes:
      - ./backend/leads.db:/app/leads.db
    env_file:
      - ./backend/.env
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
